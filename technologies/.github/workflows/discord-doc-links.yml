name: Send document links to Discord

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Get changed files from this push
        id: files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/commits/${{ github.sha }} > commit.json

          jq -r '
            .files[]
            | .filename
            | select(
                startswith("methodologies/")
                or startswith("technologies/")
                or startswith("walkthroughs/")
                or endswith(".md")
                or endswith(".pdf")
                or endswith(".pptx")
              )
          ' commit.json > matched_files.txt

          if [ ! -s matched_files.txt ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_files=true" >> $GITHUB_OUTPUT

          {
            echo 'message<<EOF'
            echo "**Updated documents in ${{ github.repository }}**"
            echo ""
            while IFS= read -r file; do
              echo "- https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/$file"
            done < matched_files.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Send message to Discord
        if: steps.files.outputs.has_files == 'true'
        run: |
          jq -n --arg content "${{ steps.files.outputs.message }}" '{content: $content}' \
          | curl -H "Content-Type: application/json" \
                 -d @- \
                 "${{ secrets.DISCORD_WEBHOOK_URL }}"